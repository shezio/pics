<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מעקב ש״ס</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .masechet {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .masechet h2 {
      margin-top: 0;
    }

    .pages {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    label {
      background: rgba(255,255,255,0.15);
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    label:hover {
      background: rgba(255,255,255,0.3);
    }

    input {
      margin-left: 4px;
    }

    .progress {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>📖 מעקב ש״ס</h1>

<button onclick="resetAll()">איפוס הכל</button>

<div class="container" id="app"></div>

<script>
const masechtot = {
  "ברכות": 64,
  "שבת": 157,
  "עירובין": 105,
  "פסחים": 121,
  "שקלים": 22,
  "יומא": 88,
  "סוכה": 56,
  "ביצה": 40,
  "ראש השנה": 35,
  "תענית": 31,
  "מגילה": 32,
  "מועד קטן": 29,
  "חגיגה": 27,
  "יבמות": 122,
  "כתובות": 112,
  "נדרים": 91,
  "נזיר": 66,
  "סוטה": 49,
  "גיטין": 90,
  "קידושין": 82,
  "בבא קמא": 119,
  "בבא מציעא": 119,
  "בבא בתרא": 176,
  "סנהדרין": 113,
  "מכות": 24,
  "שבועות": 49,
  "עבודה זרה": 76,
  "הוריות": 14,
  "זבחים": 120,
  "מנחות": 110,
  "חולין": 142,
  "בכורות": 61,
  "ערכין": 34,
  "תמורה": 34,
  "כריתות": 28,
  "מעילה": 22,
  "תמיד": 10,
  "נידה": 73
};

const heb = [
"", "א","ב","ג","ד","ה","ו","ז","ח","ט",
"י","יא","יב","יג","יד","טו","טז","יז","יח","יט",
"כ","כא","כב","כג","כד","כה","כו","כז","כח","כט",
"ל","לא","לב","לג","לד","לה","לו","לז","לח","לט",
"מ","מא","מב","מג","מד","מה","מו","מז","מח","מט",
"נ","נא","נב","נג","נד","נה","נו","נז","נח","נט",
"ס","סא","סב","סג","סד","סה","סו","סז","סח","סט",
"ע","עא","עב","עג","עד","עה","עו","עז","עח","עט",
"פ","פא","פב","פג","פד","פה","פו","פז","פח","פט",
"צ","צא","צב","צג","צד","צה","צו","צז","צח","צט",
"ק","קא","קב","קג","קד","קה","קו","קז","קח","קט",
"קי","קיא","קיב","קיג","קיד","קטו","קטז","קיז","קיח","קיט",
"קכ","קכא","קכב","קכג","קכד","קכה","קכו","קכז","קכח","קכט",
"קל","קלא","קלב","קלג","קלד","קלה","קלו","קלז","קלח","קלט",
"קמ","קמא","קמב","קמג","קמד","קמה","קמו","קמז","קמח","קמט",
"קנ","קנא","קנב","קנג","קנד","קנה","קנו","קנז","קנח","קנט",
"קס","קסא","קסב","קסג","קסד","קסה","קסו","קסז","קסח","קסט",
"קע","קעא","קעב","קעג","קעד","קעה","קעו"
];

function save(id,val){ localStorage.setItem(id,val); }
function load(id){ return localStorage.getItem(id)==="true"; }

function resetAll(){
  localStorage.clear();
  location.reload();
}

const app = document.getElementById("app");

Object.entries(masechtot).forEach(([name,total])=>{

  const div = document.createElement("div");
  div.className="masechet";

  const title = document.createElement("h2");
  title.innerText=name;

  const progress = document.createElement("div");
  progress.className="progress";

  const pagesDiv = document.createElement("div");
  pagesDiv.className="pages";

  for(let i=2;i<=total;i++){
    const hebNum = heb[i];

    ["."," :"].forEach((side,index)=>{

      const id = `${name}-${i}-${index}`;

      const label = document.createElement("label");
      const cb = document.createElement("input");

      cb.type="checkbox";
      cb.checked = load(id);

      cb.onchange=()=>{
        save(id,cb.checked);
        update();
      };

      label.appendChild(cb);
      label.appendChild(document.createTextNode(
        index===0 ? `${hebNum}.` : `${hebNum}:`
      ));

      pagesDiv.appendChild(label);
    });
  }

  function update(){
    const totalPages = (total-1)*2;
    const done = pagesDiv.querySelectorAll("input:checked").length;
    progress.innerText = `התקדמות: ${done}/${totalPages}`;
  }

  update();

  div.appendChild(title);
  div.appendChild(progress);
  div.appendChild(pagesDiv);
  app.appendChild(div);
});
</script>

</body>
</html>
